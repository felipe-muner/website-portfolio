<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" role="img" aria-label="Sacolaria Brasil">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e4937"/>
      <stop offset="100%" stop-color="#0b3d2e"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="400" height="300" fill="url(#bg)"/>
  <circle cx="60" cy="50" r="90" fill="#14573f" opacity="0.5"/>
  <circle cx="350" cy="250" r="80" fill="#0e4937" opacity="0.6"/>

  <!-- Sacola alça camiseta (azul) -->
  <g transform="translate(96 92) rotate(-8)">
    <path d="M0 22 L0 16 Q0 13 3 13 L16 13 Q19 13 20 16 Q26 28 38 28 Q50 28 56 16 Q57 13 60 13 L73 13 Q76 13 76 16 L76 22 L76 150 Q76 154 72 154 L4 154 Q0 154 0 150 Z" fill="#1e5bd6" stroke="rgba(0,0,0,0.18)" stroke-width="2"/>
    <path d="M0 22 L0 150 Q0 154 4 154 L72 154 Q76 154 76 150 L76 22 Z" fill="url(#sheen)"/>
  </g>

  <!-- Sacola boca de palhaço (amarela) -->
  <g transform="translate(196 70) rotate(6)">
    <rect x="0" y="0" width="86" height="160" rx="6" fill="#f5c518" stroke="rgba(0,0,0,0.18)" stroke-width="2"/>
    <rect x="0" y="0" width="86" height="160" rx="6" fill="url(#sheen)"/>
    <rect x="28" y="12" width="30" height="11" rx="5.5" fill="#ffffff" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
  </g>

  <!-- Sacola reciclada (verde) -->
  <g transform="translate(286 110) rotate(-4)">
    <path d="M0 18 L0 13 Q0 10 3 10 L14 10 Q17 10 18 13 Q23 23 33 23 Q43 23 48 13 Q49 10 52 10 L63 10 Q66 10 66 13 L66 18 L66 130 Q66 134 62 134 L4 134 Q0 134 0 130 Z" fill="#2f8f57" stroke="rgba(0,0,0,0.18)" stroke-width="2"/>
    <circle cx="33" cy="86" r="16" fill="#ffffff" stroke="#1f6b3f" stroke-width="2"/>
    <path d="M33 78 l4 6 -3 0 0 5 -3 0 0-5 -3 0 z" fill="#2f8f57"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(28 232)">
    <rect x="0" y="0" width="34" height="34" rx="8" fill="#f5c518"/>
    <text x="17" y="24" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#0b3d2e">SB</text>
    <text x="46" y="17" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff">Sacolaria Brasil</text>
    <text x="46" y="31" font-family="Inter, Arial, sans-serif" font-size="9.5" letter-spacing="1.5" fill="#9cc2b2">SACOLAS PLÁSTICAS · ATACADO</text>
  </g>
</svg>
